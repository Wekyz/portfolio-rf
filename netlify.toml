# ── REDIRECTS ────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404

# ── HEADERS GLOBAUX ──────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cloud.umami.is https://identity.netlify.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://*.vimeocdn.com https://*.vimeo.com https://i.vimeocdn.com; frame-src https://player.vimeo.com; connect-src 'self' https://*.vimeo.com https://api.vimeo.com https://fresnel.vimeo.com https://vimeo.com https://cloud.umami.is https://api-gateway.umami.dev https://*.netlify.com https://api.github.com;"

# ── CACHE — assets statiques ─────────────────────────────────────
[[headers]]
  for = "/*.otf"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── CACHE — thumbs et live ────────────────────────────────────────
[[headers]]
  for = "/thumbs/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/live/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# ── CACHE — videos.json ──────────────────────────────────────────
[[headers]]
  for = "/videos.json"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=300"

# ── ADMIN — CSP élargie pour Decap CMS (unsafe-eval requis) ──────
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag  = "noindex, nofollow"
    Cache-Control = "no-store"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://*.vimeocdn.com https://*.vimeo.com https://i.vimeocdn.com; frame-src 'self'; connect-src 'self' https://*.netlify.com https://api.github.com;"
